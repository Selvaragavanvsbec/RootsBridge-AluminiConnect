<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard – RootsBridge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
  <style>
    .admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:28px}
    .admin-card{background:var(--card);border:1px solid var(--border-lt);border-radius:var(--rl);padding:28px;box-shadow:var(--sh-sm)}
    .admin-card h3{font-family:var(--fd);font-size:1.1rem;font-weight:700;color:var(--ink);margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .chart-bar{display:flex;align-items:flex-end;gap:8px;height:140px;padding:0 8px}
    .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
    .bar-fill{width:100%;border-radius:6px 6px 0 0;transition:height .6s ease}
    .bar-label{font-size:.68rem;color:var(--ink-muted)}
    .bar-val{font-size:.7rem;font-weight:700;color:var(--ink)}
    .admin-actions{display:flex;gap:12px;margin-bottom:28px}
    .admin-actions .btn{display:flex;align-items:center;gap:6px}
  </style>
</head>
<body>
<div id="main-nav"></div>
<div class="dash-body">
  <div class="container">
    <div class="dash-header" style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div><h1 class="dash-title">Admin Dashboard</h1><p class="dash-subtitle">Platform overview and analytics.</p></div>
      <div class="admin-actions">
        <button class="btn btn-em btn-sm" onclick="showToast('📄 Report exported as CSV!')">📄 Export CSV</button>
        <button class="btn btn-ivory btn-sm" onclick="showToast('📊 PDF report generated!')">📊 Export PDF</button>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-icon">🎓</div><div class="stat-value" style="color:var(--em)">12,480</div><div class="stat-label">Total Alumni</div></div>
      <div class="stat-card"><div class="stat-icon">📚</div><div class="stat-value" style="color:#3B82F6">3,400</div><div class="stat-label">Active Students</div></div>
      <div class="stat-card"><div class="stat-icon">🤝</div><div class="stat-value" style="color:var(--gold)">840</div><div class="stat-label">Mentorships</div></div>
      <div class="stat-card"><div class="stat-icon">💼</div><div class="stat-value" style="color:var(--em-rich)">2,400</div><div class="stat-label">Jobs Posted</div></div>
    </div>
    <div class="admin-grid">
      <div class="admin-card">
        <h3>📈 Monthly Registrations</h3>
        <div class="chart-bar" id="reg-chart"></div>
      </div>
      <div class="admin-card">
        <h3>🤝 Mentorship Growth</h3>
        <div class="chart-bar" id="mentor-chart"></div>
      </div>
    </div>
    <div class="admin-card">
      <h3>👥 Recent Users</h3>
      <table class="data-table">
        <thead><tr><th>Name</th><th>Role</th><th>Institution</th><th>Joined</th><th>Status</th></tr></thead>
        <tbody id="users-table"></tbody>
      </table>
    </div>
  </div>
</div>
<div class="toast" id="toast"><div class="toast-dot"></div><span id="toast-msg"></span></div>
<script src="js/config.js"></script><script src="js/api.js"></script><script src="js/app.js"></script>
<script>
if(!requireAuth()){}
renderNav('admin');
// Charts
const regData=[{m:'Sep',v:420},{m:'Oct',v:580},{m:'Nov',v:510},{m:'Dec',v:690},{m:'Jan',v:750},{m:'Feb',v:890}];
const mentorData=[{m:'Sep',v:45},{m:'Oct',v:62},{m:'Nov',v:78},{m:'Dec',v:95},{m:'Jan',v:110},{m:'Feb',v:140}];
function renderChart(id,data,color){const max=Math.max(...data.map(d=>d.v));document.getElementById(id).innerHTML=data.map(d=>{const h=(d.v/max*100);return`<div class="bar-col"><div class="bar-val">${d.v}</div><div class="bar-fill" style="height:${h}%;background:${color}"></div><div class="bar-label">${d.m}</div></div>`;}).join('');}
renderChart('reg-chart',regData,'linear-gradient(180deg,var(--em-glow),var(--em-rich))');
renderChart('mentor-chart',mentorData,'linear-gradient(180deg,#D4A847,#B8860B)');
// Users table
const users=[
  {name:'Ananya Sharma',role:'Student',inst:'IIT Madras',joined:'Mar 12, 2025',status:'active'},
  {name:'Vikram Patel',role:'Alumni',inst:'PSG Tech',joined:'Mar 11, 2025',status:'active'},
  {name:'Kavya Subramanian',role:'Alumni',inst:'NIT Trichy',joined:'Mar 10, 2025',status:'active'},
  {name:'Rohit Kumar',role:'Student',inst:'VIT Vellore',joined:'Mar 09, 2025',status:'pending'},
  {name:'Sneha Reddy',role:'Alumni',inst:'BITS Pilani',joined:'Mar 08, 2025',status:'active'},
];
document.getElementById('users-table').innerHTML=users.map(u=>`<tr><td style="font-weight:600">${u.name}</td><td><span class="badge ${u.role==='Alumni'?'badge-success':'badge-info'}">${u.role}</span></td><td>${u.inst}</td><td>${u.joined}</td><td><span class="badge ${u.status==='active'?'badge-success':'badge-warning'}">${u.status}</span></td></tr>`).join('');
</script>
</body>
</html>
